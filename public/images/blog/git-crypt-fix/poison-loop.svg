<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1212;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="poison" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0.1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="800" height="440" rx="12" fill="url(#bg2)"/>
  <text x="400" y="36" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="500" letter-spacing="2">THE SELF-REINFORCING POISON LOOP</text>
  <text x="400" y="56" text-anchor="middle" fill="#7f1d1d" font-size="11">How git-crypt encryption poisoned its own infrastructure files</text>

  <!-- Step 1: .gitcrypt -->
  <rect x="40" y="90" width="220" height="80" rx="8" fill="url(#poison)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="150" y="115" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">1. .gitcrypt manifest</text>
  <text x="150" y="135" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="monospace">.git*</text>
  <text x="150" y="150" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="monospace">.gitattributes</text>
  <text x="150" y="163" text-anchor="middle" fill="#7f1d1d" font-size="9">(poisoned patterns)</text>

  <!-- Arrow 1->2 -->
  <line x1="260" y1="130" x2="300" y2="130" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: gencrypt_setup -->
  <rect x="305" y="90" width="200" height="80" rx="8" fill="url(#poison)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="405" y="115" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">2. gencrypt_setup()</text>
  <text x="405" y="137" text-anchor="middle" fill="#fca5a5" font-size="10">Reads .gitcrypt</text>
  <text x="405" y="155" text-anchor="middle" fill="#fca5a5" font-size="10">Writes .gitattributes</text>

  <!-- Arrow 2->3 -->
  <line x1="505" y1="130" x2="545" y2="130" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: .gitattributes -->
  <rect x="550" y="90" width="210" height="80" rx="8" fill="url(#poison)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="655" y="115" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">3. .gitattributes</text>
  <text x="655" y="135" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="monospace">.git* filter=git-crypt</text>
  <text x="655" y="150" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="monospace">.gitattributes filter=...</text>
  <text x="655" y="163" text-anchor="middle" fill="#7f1d1d" font-size="9">(circular dependency!)</text>

  <!-- Arrow 3->4 (down) -->
  <line x1="655" y1="170" x2="655" y2="210" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: git operations break -->
  <rect x="500" y="215" width="260" height="65" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5" opacity="0.6"/>
  <text x="630" y="240" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">4. Git operations break</text>
  <text x="630" y="258" text-anchor="middle" fill="#fca5a5" font-size="10">git add, commit, push fail</text>
  <text x="630" y="273" text-anchor="middle" fill="#fca5a5" font-size="10">git-crypt status shows warnings</text>

  <!-- Arrow 4->5 (down-left) -->
  <line x1="500" y1="260" x2="460" y2="290" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: grepo -->
  <rect x="250" y="290" width="210" height="65" rx="8" fill="url(#poison)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="355" y="315" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">5. grepo (line 731)</text>
  <text x="355" y="335" text-anchor="middle" fill="#fca5a5" font-size="10">Calls gencrypt_setup()</text>
  <text x="355" y="348" text-anchor="middle" fill="#7f1d1d" font-size="9">unconditionally!</text>

  <!-- Arrow 5->2 (curved back up) - the loop -->
  <path d="M 355 290 C 355 240, 250 200, 405 170" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- Loop label -->
  <rect x="180" y="215" width="120" height="28" rx="14" fill="#dc2626" opacity="0.3"/>
  <text x="240" y="234" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">INFINITE LOOP</text>

  <!-- Bottom note -->
  <rect x="100" y="385" width="600" height="36" rx="6" fill="#1a0a0a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="400" y="408" text-anchor="middle" fill="#7f1d1d" font-size="11">Every grepo run re-poisons the repo. Even manual fixes get overwritten on next run.</text>
</svg>
