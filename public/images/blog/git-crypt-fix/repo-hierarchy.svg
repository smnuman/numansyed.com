<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bgGrad)"/>
  <text x="400" y="40" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="500" letter-spacing="2">REPOSITORY HIERARCHY</text>
  <text x="400" y="62" text-anchor="middle" fill="#475569" font-size="11">After Restructure — All repos on main, tracking origin/main</text>

  <!-- Root node -->
  <rect x="260" y="85" width="280" height="56" rx="8" fill="url(#nodeGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="284" cy="113" r="8" fill="#3b82f6" opacity="0.8"/>
  <text x="300" y="108" fill="#e2e8f0" font-size="14" font-weight="600">~/.config/</text>
  <text x="300" y="126" fill="#64748b" font-size="11">smnuman/dotconfig.git</text>

  <!-- Lines from root -->
  <line x1="340" y1="141" x2="200" y2="190" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="141" x2="400" y2="190" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- brew node -->
  <rect x="60" y="190" width="280" height="56" rx="8" fill="url(#nodeGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="84" cy="218" r="8" fill="#22c55e" opacity="0.8"/>
  <text x="100" y="213" fill="#e2e8f0" font-size="14" font-weight="600">brew/</text>
  <text x="100" y="231" fill="#64748b" font-size="11">smnuman/config-brew.git</text>
  <rect x="310" y="198" width="24" height="16" rx="3" fill="#22c55e" opacity="0.2"/>
  <text x="322" y="210" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="600">SUB</text>

  <!-- zsh node -->
  <rect x="260" y="190" width="280" height="56" rx="8" fill="url(#nodeGrad)" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="284" cy="218" r="8" fill="#f59e0b" opacity="0.8"/>
  <text x="300" y="213" fill="#e2e8f0" font-size="14" font-weight="600">zsh/</text>
  <text x="300" y="231" fill="#64748b" font-size="11">smnuman/config-zsh.git</text>
  <rect x="510" y="198" width="24" height="16" rx="3" fill="#f59e0b" opacity="0.2"/>
  <text x="522" y="210" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="600">SUB</text>

  <!-- Lines from zsh -->
  <line x1="340" y1="246" x2="200" y2="310" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="460" y1="246" x2="560" y2="310" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- git-utils node -->
  <rect x="60" y="310" width="280" height="56" rx="8" fill="url(#nodeGrad)" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="84" cy="338" r="8" fill="#a855f7" opacity="0.8"/>
  <text x="100" y="333" fill="#e2e8f0" font-size="14" font-weight="600">git-utils/</text>
  <text x="100" y="351" fill="#64748b" font-size="11">smnuman/zsh-git-utils.git</text>
  <rect x="310" y="318" width="24" height="16" rx="3" fill="#a855f7" opacity="0.2"/>
  <text x="322" y="330" text-anchor="middle" fill="#a855f7" font-size="8" font-weight="600">SUB</text>

  <!-- prompt node -->
  <rect x="420" y="310" width="280" height="56" rx="8" fill="url(#nodeGrad)" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="444" cy="338" r="8" fill="#ec4899" opacity="0.8"/>
  <text x="460" y="333" fill="#e2e8f0" font-size="14" font-weight="600">prompt/</text>
  <text x="460" y="351" fill="#64748b" font-size="11">smnuman/zsh-prompt.git</text>
  <rect x="670" y="318" width="24" height="16" rx="3" fill="#ec4899" opacity="0.2"/>
  <text x="682" y="330" text-anchor="middle" fill="#ec4899" font-size="8" font-weight="600">SUB</text>

  <!-- Status badges -->
  <rect x="180" y="400" width="440" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="220" cy="422" r="6" fill="#22c55e"/>
  <text x="232" y="426" fill="#94a3b8" font-size="11">All on main</text>
  <circle cx="360" cy="422" r="6" fill="#22c55e"/>
  <text x="372" y="426" fill="#94a3b8" font-size="11">Tracking origin</text>
  <circle cx="500" cy="422" r="6" fill="#22c55e"/>
  <text x="512" y="426" fill="#94a3b8" font-size="11">Fully synced</text>
</svg>
