<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="700" height="350" rx="12" fill="url(#bgP)"/>
  <text x="350" y="32" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="2">THE PHANTOM SUBMODULE</text>
  <text x="350" y="50" text-anchor="middle" fill="#475569" font-size="10">A submodule pointing at its own parent repository</text>

  <!-- Root repo box -->
  <rect x="60" y="80" width="260" height="90" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="108" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">~/.config/ (ROOT)</text>
  <text x="190" y="128" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">remote: config-zsh.git</text>
  <text x="190" y="148" text-anchor="middle" fill="#475569" font-size="10">This IS the root repo</text>

  <!-- zsh/ submodule box -->
  <rect x="380" y="80" width="260" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="510" y="108" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">zsh/ (SUBMODULE)</text>
  <text x="510" y="128" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">url: config-zsh.git</text>
  <text x="510" y="148" text-anchor="middle" fill="#475569" font-size="10">Points to ROOT's remote!</text>

  <!-- Arrow showing the self-reference -->
  <path d="M 510 170 C 510 240, 350 260, 190 170" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowR)"/>

  <!-- Circular arrow label -->
  <rect x="280" y="215" width="140" height="30" rx="15" fill="#78350f" opacity="0.4" stroke="#f59e0b" stroke-width="1"/>
  <text x="350" y="235" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">SELF-REFERENCE</text>

  <!-- Naming collision explanation -->
  <rect x="100" y="270" width="500" height="55" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="350" y="290" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="500">_grepo_name collision:</text>
  <text x="210" y="310" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="monospace">~/.config -&gt; config-zsh</text>
  <text x="490" y="310" text-anchor="middle" fill="#fca5a5" font-size="10" font-family="monospace">~/.config/zsh -&gt; config-zsh</text>
  <text x="350" y="310" text-anchor="middle" fill="#475569" font-size="14">=</text>
</svg>
