<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#heroBg)"/>
  <rect width="1200" height="500" fill="url(#glow1)"/>
  <rect width="1200" height="500" fill="url(#glow2)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- LEFT: Tangled broken state -->
  <g transform="translate(100, 100)" opacity="0.7">
    <!-- Tangled lines representing broken git -->
    <path d="M 50 50 Q 100 20, 150 80 T 250 40" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.6"/>
    <path d="M 30 80 Q 80 120, 130 60 T 230 90" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <path d="M 70 30 Q 120 90, 180 40 T 260 70" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.4"/>
    <path d="M 40 100 Q 140 50, 160 120 T 240 60" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
    <path d="M 60 70 Q 90 110, 200 30 T 220 100" fill="none" stroke="#b91c1c" stroke-width="1.5" opacity="0.6"/>

    <!-- Broken lock icon -->
    <rect x="110" y="130" width="60" height="45" rx="6" fill="none" stroke="#dc2626" stroke-width="2.5"/>
    <path d="M 125 130 L 125 110 Q 125 90, 140 90 Q 155 90, 155 110 L 155 115" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="4,3"/>
    <circle cx="140" cy="152" r="5" fill="#dc2626"/>
    <line x1="140" y1="157" x2="140" y2="167" stroke="#dc2626" stroke-width="2"/>

    <!-- X marks -->
    <g transform="translate(200, 140)" stroke="#dc2626" stroke-width="2.5" opacity="0.8">
      <line x1="0" y1="0" x2="20" y2="20"/><line x1="20" y1="0" x2="0" y2="20"/>
    </g>
    <g transform="translate(50, 160)" stroke="#ef4444" stroke-width="2" opacity="0.5">
      <line x1="0" y1="0" x2="14" y2="14"/><line x1="14" y1="0" x2="0" y2="14"/>
    </g>

    <text x="140" y="220" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600" letter-spacing="1">POISONED</text>
    <text x="140" y="240" text-anchor="middle" fill="#7f1d1d" font-size="10">encrypted infrastructure</text>
    <text x="140" y="256" text-anchor="middle" fill="#7f1d1d" font-size="10">phantom submodules</text>
    <text x="140" y="272" text-anchor="middle" fill="#7f1d1d" font-size="10">detached HEADs</text>
  </g>

  <!-- CENTER: Transformation arrow -->
  <g transform="translate(500, 200)">
    <line x1="0" y1="25" x2="160" y2="25" stroke="#6366f1" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
    <polygon points="160,15 185,25 160,35" fill="#6366f1" opacity="0.6"/>
    <text x="92" y="10" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="500">3 PHASES</text>
    <text x="92" y="60" text-anchor="middle" fill="#6366f1" font-size="9">decontaminate / restructure / cleanup</text>
  </g>

  <!-- RIGHT: Clean organized state -->
  <g transform="translate(780, 100)" opacity="0.8">
    <!-- Clean tree structure -->
    <circle cx="140" cy="30" r="12" fill="none" stroke="#22c55e" stroke-width="2"/>
    <circle cx="140" cy="30" r="4" fill="#22c55e"/>
    <line x1="140" y1="42" x2="80" y2="90" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <line x1="140" y1="42" x2="200" y2="90" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>

    <circle cx="80" cy="100" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="80" cy="100" r="3" fill="#22c55e"/>
    <circle cx="200" cy="100" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="200" cy="100" r="3" fill="#22c55e"/>

    <line x1="200" y1="110" x2="170" y2="150" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <line x1="200" y1="110" x2="230" y2="150" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

    <circle cx="170" cy="160" r="8" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="170" cy="160" r="3" fill="#22c55e"/>
    <circle cx="230" cy="160" r="8" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="230" cy="160" r="3" fill="#22c55e"/>

    <!-- Check marks -->
    <g transform="translate(250, 20)" stroke="#22c55e" stroke-width="2.5" opacity="0.8">
      <polyline points="0,8 5,14 15,0" fill="none"/>
    </g>
    <g transform="translate(60, 140)" stroke="#22c55e" stroke-width="2" opacity="0.5">
      <polyline points="0,6 4,10 12,0" fill="none"/>
    </g>

    <!-- Clean lock -->
    <rect x="110" y="200" width="50" height="38" rx="5" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M 122 200 L 122 185 Q 122 170, 135 170 Q 148 170, 148 185 L 148 200" fill="none" stroke="#22c55e" stroke-width="2"/>
    <circle cx="135" cy="218" r="4" fill="#22c55e"/>

    <text x="140" y="268" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600" letter-spacing="1">RESTORED</text>
    <text x="140" y="288" text-anchor="middle" fill="#166534" font-size="10">clean encryption</text>
    <text x="140" y="304" text-anchor="middle" fill="#166534" font-size="10">proper submodules</text>
    <text x="140" y="320" text-anchor="middle" fill="#166534" font-size="10">all on main</text>
  </g>

  <!-- Title text -->
  <text x="600" y="450" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="0.5">Decontaminating a Poisoned Git-Crypt Repository</text>
  <text x="600" y="478" text-anchor="middle" fill="#64748b" font-size="13">A war story about encryption gone wrong, phantom submodules, and surgical repair</text>
</svg>
